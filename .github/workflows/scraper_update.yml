# .github/workflows/scraper_update.yml
# Runs daily at midnight SGT (16:00 UTC) automatically.
# Also runs on every push to main (for testing).
# Can be triggered manually from GitHub Actions tab.

name: Drama Watch SG — Daily Update

on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC = midnight SGT every day
  push:
    branches: [main]        # also runs on push for testing
  workflow_dispatch:         # allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update scraper
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}
        run: python scraper_update.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: update-log-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
